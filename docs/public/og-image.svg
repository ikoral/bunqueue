<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <linearGradient id="bunny" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9a8d4"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Dark Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.3"/>

  <!-- Accent glow -->
  <ellipse cx="200" cy="315" rx="300" ry="250" fill="#ec4899" opacity="0.08"/>
  <ellipse cx="1000" cy="315" rx="200" ry="200" fill="#3b82f6" opacity="0.05"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo bunny - left side -->
  <g transform="translate(100, 200) scale(4)">
    <!-- Left ear -->
    <ellipse cx="12" cy="8" rx="4" ry="10" fill="url(#bunny)"/>
    <!-- Right ear -->
    <ellipse cx="28" cy="8" rx="4" ry="10" fill="url(#bunny)"/>
    <!-- Head -->
    <circle cx="20" cy="24" r="14" fill="url(#bunny)"/>
    <!-- Eyes -->
    <ellipse cx="15" cy="22" rx="2.5" ry="3" fill="#18181b"/>
    <ellipse cx="25" cy="22" rx="2.5" ry="3" fill="#18181b"/>
    <circle cx="16" cy="21" r="1" fill="white"/>
    <circle cx="26" cy="21" r="1" fill="white"/>
    <!-- Nose -->
    <ellipse cx="20" cy="28" rx="2" ry="1.5" fill="#be185d"/>
    <!-- Mouth -->
    <path d="M 17 30 Q 20 33 23 30" stroke="#be185d" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Main Title -->
  <text x="320" y="270" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="96" font-weight="800" fill="#ffffff" letter-spacing="-3">bunqueue</text>

  <!-- Tagline -->
  <text x="320" y="340" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="32" font-weight="400" fill="#94a3b8">High-performance job queue for Bun</text>

  <!-- Feature badges -->
  <g transform="translate(320, 390)">
    <!-- Badge 1 -->
    <rect x="0" y="0" width="160" height="40" rx="20" fill="#1e3a5f"/>
    <text x="80" y="27" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#60a5fa">SQLite</text>

    <!-- Badge 2 -->
    <rect x="175" y="0" width="180" height="40" rx="20" fill="#3f1f3f"/>
    <text x="265" y="27" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#f472b6">Zero Redis</text>

    <!-- Badge 3 -->
    <rect x="370" y="0" width="200" height="40" rx="20" fill="#1f3f2f"/>
    <text x="470" y="27" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#4ade80">BullMQ API</text>
  </g>

  <!-- Performance highlight -->
  <g transform="translate(320, 470)">
    <text x="0" y="0" font-family="Inter, -apple-system, sans-serif" font-size="64" font-weight="800" fill="url(#accent)">32x</text>
    <text x="150" y="0" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="500" fill="#64748b">faster than BullMQ</text>
    <text x="0" y="50" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#475569">500,000+ ops/sec with SQLite persistence</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0f172a"/>
  <text x="600" y="618" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#64748b">github.com/egeominotti/bunqueue</text>

  <!-- Bottom accent line -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
