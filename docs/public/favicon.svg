<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bunny" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9a8d4"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce7f3"/>
      <stop offset="100%" style="stop-color:#fbcfe8"/>
    </linearGradient>
  </defs>

  <!-- Left ear -->
  <ellipse cx="10" cy="6" rx="3" ry="8" fill="url(#bunny)"/>
  <ellipse cx="10" cy="6" rx="1.5" ry="5.5" fill="url(#inner)"/>

  <!-- Right ear -->
  <ellipse cx="22" cy="6" rx="3" ry="8" fill="url(#bunny)"/>
  <ellipse cx="22" cy="6" rx="1.5" ry="5.5" fill="url(#inner)"/>

  <!-- Head -->
  <circle cx="16" cy="20" r="11" fill="url(#bunny)"/>

  <!-- Face -->
  <circle cx="16" cy="20" r="8" fill="url(#inner)"/>

  <!-- Eyes -->
  <circle cx="12" cy="18" r="2" fill="#18181b"/>
  <circle cx="20" cy="18" r="2" fill="#18181b"/>
  <circle cx="12.5" cy="17.5" r="0.7" fill="#fff"/>
  <circle cx="20.5" cy="17.5" r="0.7" fill="#fff"/>

  <!-- Nose -->
  <ellipse cx="16" cy="22" rx="1.5" ry="1" fill="#ec4899"/>

  <!-- Mouth -->
  <path d="M14 24 Q16 26 18 24" stroke="#ec4899" stroke-width="0.8" fill="none"/>
</svg>
