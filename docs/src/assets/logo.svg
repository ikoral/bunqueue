<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Rounded square base -->
  <rect x="2" y="2" width="36" height="36" rx="10" fill="url(#grad)"/>

  <!-- Queue bars - three horizontal lines representing items in a queue -->
  <rect x="9" y="10" width="18" height="4" rx="2" fill="white" opacity="0.95"/>
  <rect x="9" y="18" width="14" height="4" rx="2" fill="white" opacity="0.7"/>
  <rect x="9" y="26" width="10" height="4" rx="2" fill="white" opacity="0.45"/>

  <!-- Arrow/flow indicator -->
  <polygon points="30,19 35,20 30,21" fill="white" opacity="0.8"/>
</svg>
