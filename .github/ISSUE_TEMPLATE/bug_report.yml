name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out **all** sections below.
        Incomplete reports will be closed — we need full context to investigate.

  - type: input
    id: version
    attributes:
      label: bunqueue version
      placeholder: "e.g. 2.6.80"
    validations:
      required: true

  - type: input
    id: bun-version
    attributes:
      label: Bun version
      placeholder: "e.g. 1.3.11"
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Embedded
        - TCP Server
        - Both
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened? What did you expect instead?
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Full reproduction code
      description: |
        Paste a **minimal, complete, runnable** code snippet that reproduces the bug.
        Must include Queue creation, Worker creation (if applicable), and job processing.
        Do NOT paste just a single line — we need the full setup to reproduce.
      placeholder: |
        import { Queue, Worker } from 'bunqueue/client';

        const queue = new Queue('my-queue', { embedded: true });
        const worker = new Worker('my-queue', async (job) => {
          // ...
        }, { embedded: true });

        await queue.add('task', { data: 'hello' });
      render: typescript
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error output
      description: Paste the full error output or logs. Include any `[Storage]`, `[Worker]`, or `[Queue]` log lines.
      render: shell
    validations:
      required: true

  - type: dropdown
    id: has-worker
    attributes:
      label: Do you have a Worker running on this queue?
      description: A Worker is required to process jobs. Without it, jobs stay in "waiting" state by design.
      options:
        - "Yes — Worker is running on the same queue name"
        - "No — I only use Queue (no Worker)"
        - "Not sure"
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Queue/Worker configuration
      description: |
        Paste your Queue and Worker options. Include: concurrency, heartbeatInterval, pollTimeout,
        stallConfig, dlqConfig, connection options, or any other non-default settings.
      placeholder: |
        Queue: new Queue('emails', { embedded: true, dataPath: './data/q.db' })
        Worker: new Worker('emails', processor, { embedded: true, concurrency: 5 })
        Stall: queue.setStallConfig({ enabled: true, stallInterval: 30000 })
      render: typescript
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Docker
        - Other
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Any extra info — screenshots, environment variables, framework (Elysia, Hono, etc.), deployment setup.
    validations:
      required: false
